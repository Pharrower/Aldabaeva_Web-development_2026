<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить подопечного — Приют "Доброе сердце"</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <a href="/catalog" class="btn btn-link text-secondary mb-3 p-0 text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i> Вернуться в каталог
            </a>

            <div class="card border-0 shadow-sm p-4 animal-card filter-box">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <div class="p-3 rounded-circle d-inline-block bg-stat-home text-warning fs-2 mb-2" style="line-height: 1;">
                            <i class="bi bi-patch-plus-fill"></i>
                        </div>
                        <h2 class="card-title fw-bold text-dark m-0">Новый подопечный приюта</h2>
                        <p class="text-muted small">Заполните анкету для публикации животного в каталоге</p>
                    </div>

                    <form th:action="@{/admin/add-animal}" th:object="${animal}" method="post" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-dark">Кличка хвостика</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-muted border-warning-subtle"><i class="bi bi-tag-fill"></i></span>
                                <input type="text" th:field="*{name}" class="form-control border-warning-subtle" required placeholder="Например: Боня">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold text-dark">Биологический вид</label>
                                <select th:field="*{species}" class="form-select border-warning-subtle">
                                    <option value="Собака">🦮 Собака</option>
                                    <option value="Кошка">🐈 Кошка</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold text-dark">Пол питомца</label>
                                <select th:field="*{gender}" class="form-select border-warning-subtle">
                                    <option value="Мужской">Мальчик</option>
                                    <option value="Женский">Девочка</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold text-dark">Возраст (полных лет/месяцев)</label>
                                <div class="input-group">
                                    <input type="number" th:field="*{age}" class="form-control border-warning-subtle" min="0" required placeholder="2">
                                    <span class="input-group-text bg-white text-muted border-warning-subtle">лет / мес</span>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold text-dark">Вес животного (кг)</label>
                                <div class="input-group">
                                    <input type="number" step="0.1" th:field="*{weight}" class="form-control border-warning-subtle" min="0" required placeholder="4.5">
                                    <span class="input-group-text bg-white text-muted border-warning-subtle">кг</span>
                                </div>
                            </div>
                        </div>

                        <input type="hidden" th:field="*{status}" value="AVAILABLE" />

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-dark">Фотография для галереи</label>
                            <div class="input-group mb-2">
                                <span class="input-group-text bg-white text-muted border-warning-subtle"><i class="bi bi-image"></i></span>
                                <input type="file" name="imageFile" id="imageFileInput" class="form-control border-warning-subtle" accept="image/*" required>
                            </div>
                            <div class="text-center mt-3 d-none" id="previewContainer">
                                <p class="small text-muted mb-1">Предпросмотр фото:</p>
                                <img id="imagePreview" src="#" alt="Превью" class="img-thumbnail shadow-sm" style="max-height: 200px; object-fit: cover; border-radius: 12px;">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-dark">История и характер пушистика</label>
                            <textarea th:field="*{description}" class="form-control border-warning-subtle" rows="4" required placeholder="Опишите характер, привычки, ладит ли с детьми или другими животными..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                            <i class="bi bi-cloud-arrow-up-fill me-2"></i> Опубликовать в каталоге
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('imageFileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').setAttribute('src', e.target.result);
                document.getElementById('previewContainer').classList.remove('d-none');
            }
            reader.readAsDataURL(file);
        }
    });
</script>
</body>
</html>
