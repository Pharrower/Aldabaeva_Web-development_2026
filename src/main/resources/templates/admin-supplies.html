<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление заявками</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🐾 Приют "Доброе сердце"</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/catalog">Каталог животных</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/help">Помочь приюту</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about">О нас</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/requests">Пристройство</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/volunteers">Волонтеры</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/donations">Пожертвования</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/supplies">Склад</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <div th:unless="${#authorization.expression('isAuthenticated()')}">
                    <a href="/login" class="btn btn-outline-light me-2">Вход</a>
                    <a href="/register" class="btn btn-primary">Регистрация</a>
                </div>

                <div th:if="${#authorization.expression('isAuthenticated()')}" class="dropdown">
                    <button class="btn btn-outline-info dropdown-toggle" type="button" id="userMenu" data-bs-toggle="dropdown">
                        Привет, <span th:text="${userName}">Имя</span>!
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-content ms-3" href="/profile" style="text-decoration: none; color: black;">Мой профиль</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">Выйти</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2>Управление складом приюта</h2>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title">Добавить новый тип товара</h5>
            <form th:action="@{/admin/supplies/save}" th:object="${newSupply}" method="post" class="row g-3">
                <div class="col-md-3">
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Название (например, Плед)" required>
                </div>
                <div class="col-md-2">
                    <input type="number" step="0.1" th:field="*{currentAmount}" class="form-control" placeholder="Сейчас" required>
                </div>
                <div class="col-md-2">
                    <input type="number" step="0.1" th:field="*{targetAmount}" class="form-control" placeholder="Цель" required>
                </div>
                <div class="col-md-2">
                    <input type="text" th:field="*{unit}" class="form-control" placeholder="Ед. изм. (кг/шт)" required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-success w-100">Добавить</button>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-hover align-middle shadow-sm bg-white rounded">
        <thead class="table-dark">
        <tr>
            <th>Наименование</th>
            <th>Текущее количество</th>
            <th>Цель (норма)</th>
            <th>Ед. изм.</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${supplies}">
            <form th:action="@{/admin/supplies/save}" method="post">
                <input type="hidden" name="id" th:value="${s.id}">
                <td><input type="text" name="name" th:value="${s.name}" class="form-control form-control-sm"></td>
                <td><input type="number" step="0.1" name="currentAmount" th:value="${s.currentAmount}" class="form-control form-control-sm"></td>
                <td><input type="number" step="0.1" name="targetAmount" th:value="${s.targetAmount}" class="form-control form-control-sm"></td>
                <td><input type="text" name="unit" th:value="${s.unit}" class="form-control form-control-sm"></td>
                <td>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-sm btn-primary">Обновить</button>
                        <a th:href="@{/admin/supplies/delete/{id}(id=${s.id})}" class="btn btn-sm btn-outline-danger">Удалить</a>
                    </div>
                </td>
            </form>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
