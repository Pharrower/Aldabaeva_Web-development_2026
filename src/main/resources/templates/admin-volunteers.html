<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Заявки волонтеров</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🐾 Приют "Доброе сердце"</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/catalog">Каталог животных</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/help">Помочь приюту</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about">О нас</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/requests">Пристройство</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/volunteers">Волонтеры</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/donations">Пожертвования</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/supplies">Склад</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <div th:unless="${#authorization.expression('isAuthenticated()')}">
                    <a href="/login" class="btn btn-outline-light me-2">Вход</a>
                    <a href="/register" class="btn btn-primary">Регистрация</a>
                </div>

                <div th:if="${#authorization.expression('isAuthenticated()')}" class="dropdown">
                    <button class="btn btn-outline-info dropdown-toggle" type="button" id="userMenu" data-bs-toggle="dropdown">
                        Привет, <span th:text="${userName}">Имя</span>!
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-content ms-3" href="/profile" style="text-decoration: none; color: black;">Мой профиль</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">Выйти</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Анкеты будущих волонтеров</h2>
    <div class="card shadow border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Имя и Email</th>
                    <th>Направление</th>
                    <th>Опыт</th>
                    <th>Дата подачи</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="v : ${volunteers}">
                    <td>
                        <strong th:text="${v.user.firstName}">Имя</strong><br>
                        <small class="text-muted" th:text="${v.user.email}">email</small>
                    </td>
                    <td>
                        <span class="badge bg-success" th:text="${v.activityType}">Тип</span>
                    </td>
                    <td th:text="${v.experience}">Опыт...</td>
                    <td th:text="${#temporals.format(v.submittedAt, 'dd.MM.yyyy HH:mm')}">Дата</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
