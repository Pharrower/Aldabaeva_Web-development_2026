<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать животное</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🐾 Приют "Доброе сердце"</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/catalog">Каталог животных</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/help">Помочь приюту</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about">О нас</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/requests">Пристройство</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/volunteers">Волонтеры</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/donations">Пожертвования</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a class="nav-link text-warning" href="/admin/supplies">Склад</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <div th:unless="${#authorization.expression('isAuthenticated()')}">
                    <a href="/login" class="btn btn-outline-light me-2">Вход</a>
                    <a href="/register" class="btn btn-primary">Регистрация</a>
                </div>

                <div th:if="${#authorization.expression('isAuthenticated()')}" class="dropdown">
                    <button class="btn btn-outline-info dropdown-toggle" type="button" id="userMenu" data-bs-toggle="dropdown">
                        Привет, <span th:text="${userName}">Имя</span>!
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-content ms-3" href="/profile" style="text-decoration: none; color: black;">Мой профиль</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">Выйти</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">Новый подопечный</h3>
                    <form th:action="@{/admin/edit-animal/{id}(id=${animal.id})}" th:object="${animal}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">Кличка</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Вид</label>
                                <select th:field="*{species}" class="form-select">
                                    <option value="Собака">Собака</option>
                                    <option value="Кошка">Кошка</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Пол</label>
                                <select th:field="*{gender}" class="form-select">
                                    <option value="Мужской">Мальчик</option>
                                    <option value="Женский">Девочка</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Возраст (лет)</label>
                                <input type="number" th:field="*{age}" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Вес (кг)</label>
                                <input type="number" step="0.1" th:field="*{weight}" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Фотография питомца</label>
                            <input type="file" name="imageFile" class="form-control" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Добавить в приют</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
