<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование питомца — Панель администратора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Интеграция фирменных теплых тонов сайта для формы редактирования */
        .form-control-edit:focus, .form-select-edit:focus {
            border-color: #ff9f43 !important;
            box-shadow: 0 0 0 0.25rem rgba(255, 159, 67, 0.25) !important;
        }
        .btn-save-animal {
            background-color: #ff9f43;
            border-color: #ff9f43;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-save-animal:hover {
            background-color: #f38b2c;
            border-color: #f38b2c;
            color: white;
            box-shadow: 0 4px 12px rgba(255, 159, 67, 0.3);
        }
        .edit-card {
            border: none;
            border-radius: 15px;
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5 mb-5">

    <div class="mb-4">
        <a href="/catalog" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
            <i class="bi bi-arrow-left me-1"></i> Вернуться в каталог
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card edit-card shadow-sm p-2 bg-white">
                <div class="card-body">

                    <div class="text-center mb-4">
                        <div class="display-6 text-warning mb-2"><i class="bi bi-pencil-square"></i></div>
                        <h3 class="fw-bold text-dark mb-1">Редактирование профиля</h3>
                        <p class="text-muted small">Изменение данных подопечного: <span class="fw-bold text-dark" th:text="${animal.name}">Питомец</span></p>
                    </div>

                    <form th:action="@{/admin/edit-animal/{id}(id=${animal.id})}" th:object="${animal}" method="post" enctype="multipart/form-data">

                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Кличка питомца</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-tag"></i></span>
                                <input type="text" th:field="*{name}" class="form-control bg-light border-start-0 ps-1 form-control-edit" placeholder="Например: Ириска" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold text-secondary small">Вид животного</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-info-circle"></i></span>
                                    <select th:field="*{species}" class="form-select bg-light border-start-0 ps-1 form-select-edit">
                                        <option value="Собака">Собака</option>
                                        <option value="Кошка">Кошка</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold text-secondary small">Пол</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-gender-ambiguous"></i></span>
                                    <select th:field="*{gender}" class="form-select bg-light border-start-0 ps-1 form-select-edit">
                                        <option value="Мужской">Мальчик</option>
                                        <option value="Женский">Девочка</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold text-secondary small">Возраст (лет)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-calendar-event"></i></span>
                                    <input type="number" min="0" max="30" th:field="*{age}" class="form-control bg-light border-start-0 ps-1 form-control-edit" placeholder="0">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold text-secondary small">Вес (кг)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-speedometer2"></i></span>
                                    <input type="number" step="0.1" min="0" max="100" th:field="*{weight}" class="form-control bg-light border-start-0 ps-1 form-control-edit" placeholder="0.0">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Обновить фотографию</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-image"></i></span>
                                <input type="file" name="imageFile" class="form-control bg-light border-start-0 ps-1 form-control-edit" accept="image/*">
                            </div>
                            <div class="form-text text-muted" style="font-size: 0.75rem;">Оставьте поле пустым, чтобы сохранить текущую фотографию питомца.</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary small">Описание характера и истории</label>
                            <textarea th:field="*{description}" class="form-control form-control-edit" rows="4" placeholder="Опишите характер животного, его привычки и особенности ухода..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-save-animal w-100 py-2 rounded-3 shadow-sm">
                            <i class="bi bi-check-circle-fill me-2"></i> Сохранить изменения
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
