<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в личный кабинет — Приют "Доброе сердце"</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body"> <div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div class="text-center mb-3">
                <a href="/" class="text-muted text-decoration-none small">
                    <i class="bi bi-house-door-fill me-1"></i> На главную страницу
                </a>
            </div>

            <div class="card auth-card shadow-sm p-3 bg-white"> <div class="card-body">

                <div class="text-center mb-4">
                    <div class="brand-icon">🐾</div>
                    <h3 class="fw-bold text-dark mt-2 mb-1">Добро пожаловать!</h3>
                    <p class="text-muted small">Войдите, чтобы помогать нашим пушистым друзьям</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center rounded-3 py-2 mb-3 small" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
                    <div>Неверный email или пароль. Попробуйте снова.</div>
                </div>

                <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center rounded-3 py-2 mb-3 small" role="alert">
                    <i class="bi bi-check-circle-fill me-2 fs-5"></i>
                    <div>Вы успешно вышли из системы.</div>
                </div>

                <form th:action="@{/login}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Электронная почта</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="username" class="form-control bg-light border-start-0 ps-1 auth-form-control" placeholder="example@mail.ru" required autocomplete="email">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control bg-light border-start-0 ps-1 auth-form-control" placeholder="••••••••" required autocomplete="current-password">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-auth w-100 shadow-sm mb-3"> <i class="bi bi-box-arrow-in-right me-2"></i> Войти в личный кабинет
                    </button>
                </form>

                <div class="position-relative my-4">
                    <hr class="text-muted opacity-25">
                    <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted small">или</span>
                </div>

                <p class="text-center mb-0 small text-muted">
                    Впервые у нас? <a href="/register" class="fw-bold text-decoration-none" style="color: #ff9f43;">Создать аккаунт</a>
                </p>
            </div>
            </div>

            <p class="text-center text-muted mt-4 small opacity-50">&copy; 2026 Приют "Доброе сердце"</p>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
