<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация в системе — Приют "Доброе сердце"</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body"> <div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div class="text-center mb-3">
                <a href="/" class="text-muted text-decoration-none small">
                    <i class="bi bi-house-door-fill me-1"></i> На главную страницу
                </a>
            </div>

            <div class="card auth-card shadow-sm p-3 bg-white"> <div class="card-body">

                <div class="text-center mb-4">
                    <div class="brand-icon">🐾</div>
                    <h3 class="fw-bold text-dark mt-2 mb-1">Регистрация</h3>
                    <p class="text-muted small">Присоединяйтесь к нам, чтобы помогать животным</p>
                </div>

                <form th:action="@{/register}" th:object="${user}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Как к вам обращаться</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" th:field="*{firstName}" class="form-control bg-light border-start-0 ps-1 auth-form-control" placeholder="Иван" required autocomplete="given-name">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Электронная почта</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                            <input type="email" th:field="*{email}" class="form-control bg-light border-start-0 ps-1 auth-form-control" placeholder="example@mail.ru" required autocomplete="email">
                        </div>
                        <div class="form-text text-muted" style="font-size: 0.75rem;">Email будет использоваться как логин для входа.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small">Придумайте пароль</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" th:field="*{password}" class="form-control bg-light border-start-0 ps-1 auth-form-control" placeholder="••••••••" required autocomplete="new-password">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-auth w-100 shadow-sm mb-3"> <i class="bi bi-person-plus me-2"></i> Создать аккаунт
                    </button>
                </form>

                <div class="position-relative my-4">
                    <hr class="text-muted opacity-25">
                    <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted small">или</span>
                </div>

                <p class="text-center mb-0 small text-muted">
                    Уже зарегистрированы? <a href="/login" class="fw-bold text-decoration-none" style="color: #ff9f43;">Войти в кабинет</a>
                </p>
            </div>
            </div>

            <p class="text-center text-muted mt-4 small opacity-50">&copy; 2026 Приют "Доброе сердце"</p>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
